</head>
<body>
  <main class="container">
    <header class="header">
      <h1>🧠 Anup’s Engineering Notebook</h1>
      <p class="subtitle">Modular insights from real-world testing, audits, and ensemble-grade strategies. Updated weekly or as inspired.</p>
    </header>

    <section class="calendar-root">
      <div class="event-card">
        <h3 class="event-title">Latest Entry</h3>
        <div id="notebook-latest">Loading latest insight…</div>
      </div>
    </section>

    <section class="card" style="margin-top:1rem">
      <h2>📚 Archive</h2>
      <details>
        <summary>View past entries</summary>
        <ul id="notebook-archive">Loading archive…</ul>
      </details>
      <noscript>
        <ul>
          <li><a href="/notebook/2026-01-03.md">2026-01-03</a></li>
          <li><a href="/notebook/2025-12-13.md">2025-12-13</a></li>
          <li><a href="/notebook/2025-12-07.md">2025-12-07</a></li>
          <li><a href="/notebook/2025-10-28.md">2025-10-28</a></li>
          <li><a href="/notebook/2025-10-26.md">2025-10-26</a></li>
        </ul>
      </noscript>
    </section>
  </main>

  <script>
    // Validate permitted filenames (YYYY-MM-DD.md)
    function isSafeNotebookFilename(name) {
      return /^\d{4}-\d{2}-\d{2}\.md$/.test(name);
    }

    // Read any ?file= param if present
    const params = new URLSearchParams(window.location.search);
    const requestedFile = params.get('file');

    fetch('notebook/notebook-index.json')
      .then(res => {
        if (!res.ok) throw new Error('Index fetch failed');
        return res.json();
      })
      .then(index => {
        // Always build archive links to the notebook UI (root-absolute),
        // so they behave the same whether opened from home or standalone.
        const archiveList = index.archive.map(file => {
          const date = file.replace('.md', '');
          // Root-absolute link to ensure consistent resolution from any page
          return `<li><a href="/engineering-notebook.html?file=${encodeURIComponent(file)}" target="_blank" rel="noopener">${date}</a></li>`;
        }).join('');
        document.getElementById('notebook-archive').innerHTML = archiveList || '<li>No archived entries.</li>';

        // Only allow requestedFile if it's safe and present in index
        const safeRequested = requestedFile &&
          isSafeNotebookFilename(requestedFile) &&
          (requestedFile === index.latest || index.archive.includes(requestedFile));

        const fileToLoad = safeRequested ? requestedFile : index.latest;

        fetch(`notebook/${fileToLoad}`)
          .then(res => {
            if (!res.ok) throw new Error('Markdown fetch failed');
            return res.text();
          })
          .then(md => {
            document.getElementById('notebook-latest').innerHTML = marked.parse(md);

            // Update template title depending on whether an archived entry is being shown
            const titleEl = document.querySelector('.event-title');
            if (safeRequested) {
              titleEl.textContent = 'Archived Entry';
              const displayDate = fileToLoad.replace('.md', '');
              document.title = `Engineering Notebook — ${displayDate}`;
            } else {
              titleEl.textContent = 'Latest Entry';
            }
          })
          .catch(err => {
            console.warn(err);
            document.getElementById('notebook-latest').textContent = '⚠️ Failed to load the requested entry.';
          });
      })
      .catch(err => {
        console.warn(err);
        document.getElementById('notebook-archive').textContent = '⚠️ Archive unavailable.';
        document.getElementById('notebook-latest').textContent = '⚠️ Failed to load latest entry.';
      });
  </script>
  <script src="/include-header.js"></script> <script src="/breadcrumb.js"></script>
</body>
</html>
