<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <title>CV — Anup Dharangutti</title>

  <meta name="description"
        content="Professional CV of Anup Dharangutti, Senior Quality Engineering Specialist with 15+ years of experience in automation, CI/CD, and enterprise testing." />
  <meta name="keywords"
        content="Anup Dharangutti CV, QA Automation Engineer, Selenium Appium C#, Quality Engineering Resume" />
  <meta name="author" content="Anup Dharangutti" />

  <link rel="canonical" href="https://www.dharangutti.in/cv.html" />

  <!-- Open Graph -->
  <meta property="og:type" content="profile" />
  <meta property="og:url" content="https://www.dharangutti.in/cv.html" />
  <meta property="og:title" content="CV — Anup Dharangutti" />
  <meta property="og:description"
        content="Senior Quality Engineering Specialist with 14+ years of enterprise automation experience." />
  <meta property="og:image" content="https://www.dharangutti.in/avatar.png" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="CV — Anup Dharangutti" />
  <meta name="twitter:description"
        content="Professional CV of Anup Dharangutti, Senior Quality Engineering Specialist." />
  <meta name="twitter:image" content="https://www.dharangutti.in/avatar.png" />

  <link rel="stylesheet" href="/styles.css" />

  <style>
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
      margin: 0;
      background: #fff;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 1.5rem;
    }

    header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    img.avatar {
      width: 72px;
      height: 72px;
      border-radius: 8px;
    }

    h1 {
      margin: 0;
      font-size: 1.4rem;
    }

    nav {
      font-size: 0.9rem;
    }

    nav a {
      color: #0366d6;
      text-decoration: none;
    }

    nav a:hover {
      text-decoration: underline;
    }

    /* PDF container */
    .pdf-container {
      margin-top: 1rem;
      border: 1px solid #ddd;
      border-radius: 8px;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      height: 85vh;
    }

    .pdf-container iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Mobile fallback — shown instead of the iframe on small screens */
    .pdf-mobile-fallback {
      display: none;
    }

    footer {
      margin-top: 1rem;
      text-align: center;
      color: #666;
      font-size: 0.85rem;
    }

    @media (max-width: 768px) {
      .pdf-container {
        display: none;
      }

      .pdf-mobile-fallback {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        margin-top: 1.5rem;
        padding: 2rem 1rem;
        border: 1px solid #ddd;
        border-radius: 8px;
        text-align: center;
        background: #f9f9f9;
      }

      .pdf-mobile-fallback p {
        margin: 0;
        color: #444;
        font-size: 0.95rem;
      }

      .pdf-mobile-fallback a.btn {
        display: inline-block;
        padding: 0.65rem 1.4rem;
        border-radius: 6px;
        font-size: 1rem;
        font-weight: 600;
        text-decoration: none;
        background: #0366d6;
        color: #fff;
      }

      .pdf-mobile-fallback a.btn:hover {
        background: #024ea4;
      }

      .pdf-mobile-fallback a.btn-secondary {
        background: #fff;
        color: #0366d6;
        border: 1px solid #0366d6;
      }

      .pdf-mobile-fallback a.btn-secondary:hover {
        background: #e8f0fb;
      }
    }
  </style>
</head>

<body>
  <main class="container">

    <header>
      <img class="avatar" src="/avatar.png" alt="Anup Dharangutti avatar"
           onerror="this.style.display='none'" />
      <div>
        <h1>Anup Dharangutti</h1>
        <nav>
          <a href="/cv.pdf" target="_blank" rel="noopener">Download PDF</a>
          &nbsp;•&nbsp;
          <a href="/contact.html">Contact</a>
        </nav>
      </div>
    </header>

    <!-- PDF viewer: iframe for desktop, fallback for mobile -->
    <section class="pdf-container" aria-label="Embedded CV PDF">
      <iframe src="/cv.pdf#toolbar=0&navpanes=0" title="CV of Anup Dharangutti">
      </iframe>
    </section>

    <div class="pdf-mobile-fallback" aria-label="CV PDF mobile options">
      <p>PDF preview is best viewed on desktop.<br />On mobile, open it directly:</p>
      <a class="btn" href="/cv.pdf" target="_blank" rel="noopener">Open CV (PDF)</a>
      <a class="btn btn-secondary" href="/cv.pdf" download>Download PDF</a>
    </div>

    <footer>
      Last updated: 2025-10-18
    </footer>

  </main>

  <script src="/include-header.js"></script>
  <script src="/breadcrumb.js"></script>
</body>
</html>
